<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Hobbies</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>My Hobbies & Interests</h1>
    <hr>

    <div class="flex-container">
        <div class="hobby-card">
            <h2>HOBBY 1 - CAT!!!</h2>
            <p>I LOVE MY CAT!</p>
            <video width="350" controls class="animate-pop">
                <source src="cat.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hobby-card">
            <h2>HOBBY 2 - DC COMICS</h2>
            <p>I LOVE DC COMICS!</p>
            <img src="HOBBY2.jpg" alt="DC Comic Hobby" width="350" class="animate-pop">
        </div>
    </div>

    <hr>
    <form action="myURL" method="POST">
        <label for="comment">Anything you want to say?</label>
        <input id="comment" type="text" required/>
        <p>If you are happy please click yes :DDD</p>
        <input type="radio" name="daily" value="yes" id="yes"/>
        <label for="yes">Yes, gladly!!</label>
        <input type="radio" name="daily" value="no" id="no"/>
        <label for="no">No I will just leave:(( </label>
        <p></p>
        <input type="submit" value="Submit Response" />
    </form>

    <hr>
    <a href="index.html">Back to my Resume</a>
</body>
</html>
